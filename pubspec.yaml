name: gopro_native
description: >-
  Linux-first GoPro camera control for Dart: USB discovery, BLE, HTTP, COHN,
  Wi-Fi and livestreaming. Enumerate-only over USB, never claiming CDC-NCM.
version: 0.2.0

homepage: https://github.com/jwinarske/gopro_native
repository: https://github.com/jwinarske/gopro_native
issue_tracker: https://github.com/jwinarske/gopro_native/issues

environment:
  sdk: ^3.10.0

platforms:
  linux:

dependencies:
  bluez_native: ^0.3.1
  code_assets: ^1.0.0
  ffi: ^2.1.0
  hooks: ^2.1.0
  protobuf: ^6.0.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0

topics:
  - gopro
  - usb
  - linux
  - ffi
